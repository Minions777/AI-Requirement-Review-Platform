# 本地开发编排：后端服务 + Dify + PostgreSQL + Milvus。
version: "3"

services:
  # FastAPI 后端服务。
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    # 注入评审链路所需环境变量。
    environment:
      - FEISHU_ACCESS_TOKEN=${FEISHU_ACCESS_TOKEN}
      - FEISHU_BOT_WEBHOOK=${FEISHU_BOT_WEBHOOK}
      - DIFY_API_KEY=${DIFY_API_KEY}
      - DIFY_URL=${DIFY_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MILVUS_URI=${MILVUS_URI}
      - MILVUS_COLLECTION=${MILVUS_COLLECTION:-requirements}
    # 后端依赖 Milvus 启动。
    depends_on:
      - milvus

  # Dify 服务（如需本地联调可进一步补齐配置）。
  dify:
    image: langgenius/dify

  # PostgreSQL 数据库。
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=postgres

  # Milvus 向量数据库。
  milvus:
    image: milvusdb/milvus:latest
